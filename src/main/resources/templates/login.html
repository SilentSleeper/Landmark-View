<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - București Landmarks</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="auth-container">
        <div class="card text-center">
            <h2 class="card-title">Welcome back</h2>
            <p class="card-subtitle">Log in to comment on landmarks.</p>

            <div th:if="${param.error}" class="form-error mb-4" style="text-align: left; background: #fee2e2; padding: 0.5rem; border-radius: 4px;">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="mb-4" style="color: #059669; text-align: left; background: #d1fae5; padding: 0.5rem; border-radius: 4px;">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post" style="text-align: left;">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-control" placeholder="you@example.com" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                </div>
                <div style="text-align: left; margin-bottom: 1.5rem;">
                    <a href="#" style="font-size: 0.875rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Log in</button>
            </form>

            <p class="mt-4" style="font-size: 0.875rem; color: var(--text-muted);">
                Don't have an account? <a th:href="@{/register}" style="font-weight: 600;">Register</a>
            </p>
        </div>
    </div>
</body>
</html>
