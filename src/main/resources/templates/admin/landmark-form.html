<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Landmark Form - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="auth-container">
        <div class="card" style="max-width: 600px;">
            <h2 class="card-title" th:text="${landmark.id == null ? 'Add New Landmark' : 'Edit Landmark'}">Add Landmark</h2>
            <p class="card-subtitle">Fill in the details below.</p>

            <form th:action="@{/admin/landmarks}" th:object="${landmark}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required/>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select th:field="*{category}" class="form-control" required>
                        <option value="Church">Church</option>
                        <option value="Palace">Palace</option>
                        <option value="Museum">Museum</option>
                        <option value="Monument">Monument</option>
                        <option value="Park">Park</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://..." required/>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" th:field="*{latitude}" class="form-control" required/>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" th:field="*{longitude}" class="form-control" required/>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Save Landmark</button>
                    <a th:href="@{/admin/landmarks}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
