<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>București Landmarks Map</title>
    <!-- CSRF Meta Tags for AJAX POST -->
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="map-layout">
        <div class="map-controls">
            <input type="text" class="form-control search-input" placeholder="Search landmarks, neighborhoods..." onkeyup="filterMap()">
            <div class="filter-chips">
                <div class="chip active" onclick="setFilter(this, 'All')">All</div>
                <div class="chip" onclick="setFilter(this, 'Church')">Churches</div>
                <div class="chip" onclick="setFilter(this, 'Palace')">Palaces</div>
                <div class="chip" onclick="setFilter(this, 'Museum')">Museums</div>
                <div class="chip" onclick="setFilter(this, 'Monument')">Monuments</div>
                <div class="chip" onclick="setFilter(this, 'Park')">Parks</div>
            </div>
        </div>

        <div class="map-container-wrapper">
            <!-- Map Container -->
            <div id="map"></div>

            <!-- Floating Side Panel -->
            <div class="side-panel" id="sidePanel">
                <button class="close-panel" onclick="closePanel()">×</button>
                <img src="" alt="Landmark photo" class="panel-image" id="panelImage">
                <div class="panel-content">
                    <h3 class="panel-title" id="panelTitle">Landmark Title</h3>
                    <p class="panel-meta" id="panelMeta">Category · Coordinates</p>
                    <p class="panel-desc" id="panelDesc">Description</p>

                    <div class="comments-section">
                        <h4>Comments (<span id="commentCount">0</span>)</h4>
                        
                        <div id="commentsList">
                            <!-- Comments injected here via JS -->
                        </div>

                        <div class="comment-input-area" sec:authorize="isAuthenticated()">
                            <textarea id="newCommentText" placeholder="Add a comment..."></textarea>
                            <div class="actions">
                                <button class="btn btn-primary" style="padding: 0.25rem 1rem; font-size: 0.75rem;" onclick="postComment()">Post</button>
                            </div>
                        </div>
                        <div class="comment-input-area" sec:authorize="!isAuthenticated()" style="text-align: center; border: none;">
                            <p style="font-size: 0.875rem; color: var(--text-muted);"><a th:href="@{/login}">Log in</a> to post a comment.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([44.4268, 26.1025], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const redIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#ef4444;width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.3);'></div>",
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        let currentActiveLandmarkId = null;
        let allMarkers = [];
        let allLandmarksData = [];
        let currentFilter = 'All';

        // Load Markers from API
        fetch('/api/landmarks')
            .then(res => res.json())
            .then(data => {
                allLandmarksData = data;
                renderMarkers(data);
            });

        function renderMarkers(data) {
            allMarkers.forEach(m => map.removeLayer(m));
            allMarkers = [];

            data.forEach(m => {
                if(currentFilter !== 'All' && m.category !== currentFilter) return;

                const marker = L.marker([m.latitude, m.longitude], { icon: redIcon }).addTo(map);
                marker.on('click', () => loadLandmarkDetails(m.id));
                allMarkers.push(marker);
            });
        }

        function setFilter(element, category) {
            document.querySelectorAll('.filter-chips .chip').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentFilter = category;
            renderMarkers(allLandmarksData);
            closePanel();
        }

        function loadLandmarkDetails(id) {
            currentActiveLandmarkId = id;
            fetch('/api/landmarks/' + id)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('panelTitle').innerText = data.landmark.name;
                    document.getElementById('panelMeta').innerText = data.landmark.category + ' · ' + data.landmark.latitude.toFixed(4) + ', ' + data.landmark.longitude.toFixed(4);
                    document.getElementById('panelDesc').innerText = data.landmark.description;
                    document.getElementById('panelImage').src = data.landmark.imageUrl || '';
                    
                    document.getElementById('commentCount').innerText = data.comments.length;
                    
                    const commentsList = document.getElementById('commentsList');
                    commentsList.innerHTML = '';
                    data.comments.forEach(c => {
                        commentsList.innerHTML += `
                            <div class="comment">
                                <div class="avatar"></div>
                                <div class="comment-body">
                                    <span class="comment-author">${c.user.displayName}</span>
                                    <span class="comment-time">${c.createdAt}</span>
                                    <p class="comment-text">${c.text}</p>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('sidePanel').classList.add('active');
                });
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.remove('active');
            currentActiveLandmarkId = null;
        }

        function postComment() {
            if (!currentActiveLandmarkId) return;
            const text = document.getElementById('newCommentText').value;
            if (!text.trim()) return;

            const token = document.querySelector("meta[name='_csrf']")?.getAttribute("content");
            const header = document.querySelector("meta[name='_csrf_header']")?.getAttribute("content");

            const headers = { 'Content-Type': 'application/json' };
            if (token && header) headers[header] = token;

            fetch('/api/landmarks/' + currentActiveLandmarkId + '/comments', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ text: text })
            }).then(res => {
                if (res.ok) {
                    document.getElementById('newCommentText').value = '';
                    loadLandmarkDetails(currentActiveLandmarkId); // Reload to show new comment
                } else if (res.status === 401) {
                    window.location.href = '/login';
                }
            });
        }
    </script>
</body>
</html>
