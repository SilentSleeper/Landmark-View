<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - București Landmarks</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="profile-header">
        <div class="profile-card">
            <div class="profile-avatar"></div>
            <div class="profile-info">
                <h1 th:text="${user != null ? user.displayName : 'Andrei Popa'}">Andrei Popa</h1>
                <p th:text="${user != null ? user.email : 'andrei.popa@example.com'}">andrei.popa@example.com</p>
                <p>Member since <span th:text="${#temporals.format(#temporals.createNow(), 'MMMM yyyy')}">May 2026</span> · <span th:text="${comments != null ? comments.size() : 0}">0</span> comments</p>
            </div>
            <div style="margin-left: auto;">
                <button class="btn btn-outline">Edit profile</button>
            </div>
        </div>
    </div>

    <div class="profile-content">
        <h3 style="margin-bottom: 1.5rem;">My comments</h3>
        
        <div th:if="${comments != null and not #lists.isEmpty(comments)}">
            <div th:each="comment : ${comments}" class="comment-card">
                <div>
                    <h4 th:text="${comment.landmark.name}">Ateneul Român</h4>
                    <p th:text="${comment.text}">Best acoustics in the city.</p>
                    <span class="time" th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy, HH:mm')}">1 week ago</span>
                </div>
                <span style="color: var(--text-muted);">→</span>
            </div>
        </div>
        
        <div th:if="${comments == null or #lists.isEmpty(comments)}">
            <p style="color: var(--text-muted);">You haven't posted any comments yet.</p>
        </div>
    </div>
</body>
</html>
